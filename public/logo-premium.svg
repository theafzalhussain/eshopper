<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="url(#checkerboard)"/>
  <defs>
    <pattern id="checkerboard" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#e5e5e5"/>
      <rect x="16" y="16" width="16" height="16" fill="#e5e5e5"/>
      <rect x="16" width="16" height="16" fill="#ffffff"/>
      <rect y="16" width="16" height="16" fill="#ffffff"/>
    </pattern>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1" gradientTransform="scale(512)">
      <stop offset="0%" stop-color="#fffbe6"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="80%" stop-color="#bfa14a"/>
      <stop offset="100%" stop-color="#fffbe6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#bfa14a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <text x="50%" y="60%" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="110" font-weight="bold" fill="url(#gold)" stroke="#bfa14a" stroke-width="3" paint-order="stroke" style="letter-spacing:0.08em;">ESHOPPER</text>
    <g transform="translate(256,180)">
      <rect x="-48" y="-48" width="96" height="96" rx="18" fill="url(#gold)" stroke="#bfa14a" stroke-width="4"/>
      <rect x="-32" y="-8" width="64" height="48" rx="12" fill="#fffbe6" stroke="#bfa14a" stroke-width="3"/>
      <rect x="-24" y="8" width="48" height="32" rx="8" fill="url(#gold)" stroke="#bfa14a" stroke-width="2"/>
      <rect x="-8" y="-32" width="16" height="24" rx="6" fill="#fffbe6" stroke="#bfa14a" stroke-width="2"/>
      <ellipse cx="0" cy="32" rx="18" ry="6" fill="#bfa14a" fill-opacity="0.18"/>
    </g>
  </g>
</svg>
