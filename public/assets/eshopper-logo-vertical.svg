<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FFC700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>

    <filter id="metallic">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" />
    </filter>
  </defs>

  <!-- Midnight Black Background -->
  <rect width="300" height="400" fill="#0a0a0a" />

  <!-- Subtle Border -->
  <rect x="10" y="10" width="280" height="380" fill="none" stroke="#2a2a2a" stroke-width="1" />

  <!-- ES Monogram with Circle -->
  <circle cx="150" cy="100" r="65" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.8" />
  <circle cx="150" cy="100" r="60" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.4" />

  <text 
    x="150" 
    y="115" 
    font-family="Playfair Display, Georgia, serif" 
    font-size="52" 
    font-weight="700"
    text-anchor="middle" 
    fill="url(#goldGradient)"
    letter-spacing="-2"
    filter="url(#metallic)">
    ES
  </text>

  <!-- Brand Name -->
  <text 
    x="150" 
    y="220" 
    font-family="Playfair Display, Georgia, serif" 
    font-size="42" 
    font-weight="600"
    text-anchor="middle" 
    fill="url(#goldGradient)"
    letter-spacing="1"
    filter="url(#metallic)">
    eShopper
  </text>

  <!-- Tagline -->
  <text 
    x="150" 
    y="260" 
    font-family="Lato, sans-serif" 
    font-size="12" 
    font-weight="300"
    text-anchor="middle" 
    fill="url(#goldGradient)"
    letter-spacing="3"
    opacity="0.7">
    BOUTIQUE LUXE
  </text>

  <!-- Decorative Lines -->
  <line x1="80" y1="300" x2="220" y2="300" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.4" />
  <line x1="85" y1="310" x2="215" y2="310" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.4" />
</svg>