<!-- Order Shipped Email | Boutique Luxe | Ultra-Premium Responsive | Strict Table Layout -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Shipped - Boutique Luxe</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0A;color:#fff;">
  <table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="min-height:100vh;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#181818;border-radius:16px;overflow:hidden;margin:32px 0;max-width:600px;">
          <!-- Header -->
          <tr>
            <td colspan="2" style="padding:32px 24px 12px 24px;text-align:left;background:#0A0A0A;">
              <img src="{{brandLogo}}" alt="Boutique Luxe Logo" width="120" style="display:block;margin-bottom:12px;">
              <div style="font-family:serif;font-size:28px;font-weight:900;color:#D4AF37;letter-spacing:2px;">Order Shipped</div>
            </td>
            <td style="padding:32px 24px 12px 0;text-align:right;background:#0A0A0A;vertical-align:top;">
              <a href="{{trackingUrl}}" style="display:inline-block;padding:10px 24px;background:#D4AF37;color:#0A0A0A;font-weight:900;font-size:15px;border-radius:8px;text-decoration:none;">Track Package</a>
            </td>
          </tr>
          <!-- Carrier Info -->
          <tr>
            <td colspan="3" style="padding:0 24px 0 24px;">
              <div style="font-size:15px;color:#fff;margin-bottom:8px;">Carrier: <span style="color:#D4AF37;font-weight:700;">{{carrier}}</span></div>
              <div style="font-size:15px;color:#fff;">Tracking ID: <span style="color:#D4AF37;font-weight:700;">{{trackingId}}</span></div>
            </td>
          </tr>
          <!-- Progress Bar -->
          <tr>
            <td colspan="3" style="padding:24px 24px 0 24px;">
              <table width="100%" cellpadding="0" cellspacing="0" style="margin:0;">
                <tr>
                  <td style="width:25%;text-align:center;color:#D4AF37;font-weight:700;">Placed</td>
                  <td style="width:25%;text-align:center;color:#D4AF37;font-weight:700;">Confirmed</td>
                  <td style="width:25%;text-align:center;background:#D4AF37;color:#0A0A0A;font-weight:900;border-radius:8px;">Shipped</td>
                  <td style="width:25%;text-align:center;color:#fff;font-weight:700;">Delivered</td>
                </tr>
                <tr>
                  <td colspan="4" style="padding:8px 0;">
                    <div style="width:100%;height:8px;background:#333;border-radius:6px;overflow:hidden;">
                      <div style="width:75%;height:8px;background:#D4AF37;"></div>
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Item Recap -->
          <tr>
            <td colspan="3" style="padding:24px 24px 0 24px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                {{#each items}}
                <tr>
                  <td style="padding:10px 0;width:80px;"><img src="{{image}}" width="80" style="border-radius:8px;box-shadow:0 2px 8px #000;" alt="Product"></td>
                  <td style="padding:10px 0;">
                    <div style="font-weight:700;color:#fff;">{{name}}</div>
                  </td>
                </tr>
                {{/each}}
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td colspan="3" style="padding:32px 24px 24px 24px;text-align:center;background:#181818;">
              <a href="https://eshopperr.me" style="color:#D4AF37;text-decoration:none;font-size:14px;font-weight:700;">eshopperr.me</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
