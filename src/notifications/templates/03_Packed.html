<!-- Order Packed Email | Boutique Luxe | Ultra-Premium Responsive | Strict Table Layout -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Packed - Boutique Luxe</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0A;color:#fff;">
  <table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="min-height:100vh;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#181818;border-radius:16px;overflow:hidden;margin:32px 0;max-width:600px;">
          <!-- Header -->
          <tr>
            <td colspan="2" style="padding:32px 24px 12px 24px;text-align:left;background:#0A0A0A;">
              <img src="{{brandLogo}}" alt="Boutique Luxe Logo" width="120" style="display:block;margin-bottom:12px;">
              <div style="font-family:serif;font-size:28px;font-weight:900;color:#D4AF37;letter-spacing:2px;">Wrapped with Care</div>
            </td>
            <td style="padding:32px 24px 12px 0;text-align:right;background:#0A0A0A;vertical-align:top;">
              <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" width="48" alt="Quality Checked" style="display:block;margin-bottom:8px;">
              <div style="font-size:13px;color:#D4AF37;font-weight:700;">Quality Checked</div>
            </td>
          </tr>
          <!-- Message -->
          <tr>
            <td colspan="3" style="padding:0 24px 18px 24px;">
              <div style="font-family:serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;">Your order has been sanitized and packed in our signature eco-friendly luxe box.</div>
            </td>
          </tr>
          <!-- Summary -->
          <tr>
            <td colspan="3" style="padding:0 24px 0 24px;">
              <table width="100%" cellpadding="0" cellspacing="0" style="margin:18px 0 0 0;">
                <tr>
                  <td style="font-size:14px;color:#fff;">Order ID:</td>
                  <td align="right" style="font-size:14px;color:#D4AF37;font-weight:900;">#{{orderId}}</td>
                </tr>
                <tr>
                  <td style="font-size:14px;color:#fff;">Items Packed:</td>
                  <td align="right" style="font-size:14px;color:#fff;">{{itemCount}}</td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td colspan="3" style="padding:32px 24px 24px 24px;text-align:center;background:#181818;">
              <div style="font-size:13px;color:#D4AF37;margin-bottom:8px;">You will receive a tracking link as soon as it leaves our warehouse.</div>
              <a href="https://eshopperr.me" style="color:#D4AF37;text-decoration:none;font-size:14px;font-weight:700;">eshopperr.me</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
