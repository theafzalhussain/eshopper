<!-- Out for Delivery Email | Boutique Luxe | Ultra-Premium Responsive | Strict Table Layout -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Out for Delivery - Boutique Luxe</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0A;color:#fff;">
  <table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="min-height:100vh;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#181818;border-radius:16px;overflow:hidden;margin:32px 0;max-width:600px;">
          <!-- Header -->
          <tr>
            <td colspan="2" style="padding:32px 24px 12px 24px;text-align:left;background:#0A0A0A;">
              <img src="{{brandLogo}}" alt="Boutique Luxe Logo" width="120" style="display:block;margin-bottom:12px;">
              <div style="font-family:serif;font-size:28px;font-weight:900;color:#D4AF37;letter-spacing:2px;">It’s Arriving Today!</div>
            </td>
          </tr>
          <!-- Safety First -->
          <tr>
            <td colspan="2" style="padding:0 24px 18px 24px;">
              <div style="font-size:16px;color:#fff;margin-bottom:8px;">Please share the OTP only when you receive the package.</div>
            </td>
          </tr>
          <!-- Support & Map -->
          <tr>
            <td style="padding:0 24px 0 24px;" valign="top">
              <a href="{{deliveryPartnerContact}}" style="display:inline-block;padding:10px 24px;background:#D4AF37;color:#0A0A0A;font-weight:900;font-size:15px;border-radius:8px;text-decoration:none;margin-bottom:8px;">Contact Delivery Partner</a>
              <br>
              <a href="https://wa.me/918447859784?text=Change%20my%20delivery%20address%20or%20time%20for%20order%20{{orderId}}" style="display:inline-block;margin-top:8px;color:#D4AF37;text-decoration:none;font-size:14px;font-weight:700;">Change Delivery Address/Time (WhatsApp)</a>
            </td>
            <td style="padding:0 24px 0 24px;text-align:right;" valign="top">
              <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" width="80" alt="Map" style="border-radius:8px;background:#222;">
            </td>
          </tr>
          <!-- Trust -->
          <tr>
            <td colspan="2" style="padding:24px 24px 0 24px;text-align:center;">
              <div style="font-size:13px;color:#D4AF37;margin-top:8px;">100% Authentic & Insured Delivery</div>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td colspan="2" style="padding:32px 24px 24px 24px;text-align:center;background:#181818;">
              <a href="https://eshopperr.me" style="color:#D4AF37;text-decoration:none;font-size:14px;font-weight:700;">eshopperr.me</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
