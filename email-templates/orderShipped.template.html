<!-- Order Shipped Email Template for Boutique Luxe -->
<html>
  <body style="background:#0A0A0A; color:#D4AF37; margin:0; padding:0;">
    <table align="center" width="600" cellpadding="0" cellspacing="0" style="margin:auto; max-width:600px; background:#0A0A0A; color:#D4AF37; font-family:'Segoe UI', Arial, sans-serif;">
      <tr>
        <td colspan="2" style="text-align:center; padding:24px 0;">
          <a href="{{trackPackageUrl}}" style="background:#D4AF37; color:#0A0A0A; padding:12px 32px; border-radius:24px; text-decoration:none; font-weight:bold; font-size:18px;">Track Package</a>
        </td>
      </tr>
      <tr>
        <td style="text-align:left; font-size:16px;">Carrier: <b>{{carrierName}}</b></td>
        <td style="text-align:right; font-size:16px;">Tracking ID: <b>{{trackingId}}</b></td>
      </tr>
      <tr>
        <td colspan="2" style="padding:16px 0;">
          <table width="100%" cellpadding="8" cellspacing="0" style="background:#181818; border-radius:8px;">
            <tr>
              <td style="text-align:center;">
                <div style="width:100%; max-width:400px; margin:auto;">
                  <div style="display:flex; justify-content:space-between;">
                    <span style="color:#D4AF37;">Placed</span>
                    <span style="color:#D4AF37;">Confirmed</span>
                    <span style="color:#D4AF37; font-weight:bold;">Shipped</span>
                    <span style="color:#888;">Delivered</span>
                  </div>
                  <div style="height:8px; background:#333; border-radius:4px; margin:8px 0;">
                    <div style="width:75%; height:8px; background:#D4AF37; border-radius:4px;"></div>
                  </div>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td colspan="2" style="padding:16px 0;">
          <table width="100%" cellpadding="8" cellspacing="0" style="background:#181818; border-radius:8px;">
            <tr>
              <th>Image</th>
              <th>Item Name</th>
            </tr>
            {{#each items}}
            <tr>
              <td style="text-align:center;"><img src="{{imageUrl}}" style="width:80px; border-radius:8px;" /></td>
              <td>{{name}}</td>
            </tr>
            {{/each}}
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
