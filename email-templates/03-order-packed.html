<!--
Order Packed Email (Processing) - Boutique Luxe
Strictly <table> only, 600px max, Deep Black & Gold, fully responsive, all features as per prompt
-->
<table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="margin:0;padding:0;width:100%;background:#0A0A0A;font-family:'Playfair Display',serif,Georgia,'Times New Roman',Times,sans-serif;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#0A0A0A;border-radius:16px;overflow:hidden;">
        <!-- Header -->
        <tr>
          <td style="padding:32px 32px 0 32px;background:#0A0A0A;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="left" style="vertical-align:middle;">
                  <img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/luxe-logo-gold.png" alt="Boutique Luxe" style="height:48px;display:block;"/>
                </td>
                <td align="right" style="vertical-align:middle;">
                  <div style="color:#D4AF37;font-size:13px;font-weight:600;letter-spacing:0.5px;">Order ID</div>
                  <div style="color:#fff;font-size:16px;font-weight:700;">#{{orderId}}</div>
                  <div style="color:#bbb;font-size:13px;">{{orderDate}}</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Wrapped with Care -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <div style="background:#181818;border-radius:10px;padding:18px 0;text-align:center;">
              <span style="color:#D4AF37;font-size:22px;font-weight:900;letter-spacing:1px;">Wrapped with Care</span>
            </div>
          </td>
        </tr>
        <!-- Message -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <div style="color:#fff;font-size:16px;font-weight:500;background:#181818;border-radius:8px;padding:18px 24px;">Your order has been sanitized and packed in our signature eco-friendly luxe box.</div>
          </td>
        </tr>
        <!-- Quality Checked Stamp -->
        <tr>
          <td style="padding:32px 32px 0 32px;" align="center">
            <img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/quality-checked-stamp.png" alt="Quality Checked" style="height:54px;"/>
          </td>
        </tr>
        <!-- Summary -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#181818;border-radius:10px;">
              <tr>
                <td style="color:#D4AF37;font-size:15px;font-weight:700;padding:12px 0;">Order ID</td>
                <td style="color:#fff;font-size:15px;font-weight:700;padding:12px 0;">#{{orderId}}</td>
                <td style="color:#D4AF37;font-size:15px;font-weight:700;padding:12px 0;">Items</td>
                <td style="color:#fff;font-size:15px;font-weight:700;padding:12px 0;">{{itemsCount}}</td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="padding:32px 32px 32px 32px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center">
                  <span style="color:#bbb;font-size:15px;">You will receive a tracking link as soon as it leaves our warehouse.</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
