<!--
Order Shipped Email (The Tracking Email) - Boutique Luxe
Strictly <table> only, 600px max, Deep Black & Gold, fully responsive, all features as per prompt
-->
<table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="margin:0;padding:0;width:100%;background:#0A0A0A;font-family:'Playfair Display',serif,Georgia,'Times New Roman',Times,sans-serif;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#0A0A0A;border-radius:16px;overflow:hidden;">
        <!-- Header -->
        <tr>
          <td style="padding:32px 32px 0 32px;background:#0A0A0A;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="left" style="vertical-align:middle;">
                  <img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/luxe-logo-gold.png" alt="Boutique Luxe" style="height:48px;display:block;"/>
                </td>
                <td align="right" style="vertical-align:middle;">
                  <div style="color:#D4AF37;font-size:13px;font-weight:600;letter-spacing:0.5px;">Order ID</div>
                  <div style="color:#fff;font-size:16px;font-weight:700;">#{{orderId}}</div>
                  <div style="color:#bbb;font-size:13px;">{{orderDate}}</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Tracking Hero -->
        <tr>
          <td style="padding:32px 32px 0 32px;" align="center">
            <a href="{{trackingLink}}" style="display:inline-block;padding:16px 48px;background:#D4AF37;color:#0A0A0A;font-size:18px;font-weight:800;border-radius:10px;text-decoration:none;">Track Package</a>
          </td>
        </tr>
        <!-- Carrier Info -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#181818;border-radius:10px;">
              <tr>
                <td style="color:#D4AF37;font-size:15px;font-weight:700;padding:12px 0;">Courier</td>
                <td style="color:#fff;font-size:15px;font-weight:700;padding:12px 0;">{{courierName}}</td>
                <td style="color:#D4AF37;font-size:15px;font-weight:700;padding:12px 0;">Tracking ID</td>
                <td style="color:#fff;font-size:15px;font-weight:700;padding:12px 0;">{{trackingId}}</td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Progress Bar -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center">
                  <table cellpadding="0" cellspacing="0" style="width:100%;max-width:480px;margin:0 auto;">
                    <tr>
                      <td style="width:25%;text-align:center;">
                        <span style="display:inline-block;width:32px;height:32px;background:#D4AF37;color:#0A0A0A;font-weight:900;font-size:18px;line-height:32px;border-radius:50%;">1</span>
                        <div style="color:#D4AF37;font-size:13px;font-weight:700;margin-top:6px;">Placed</div>
                      </td>
                      <td style="width:25%;text-align:center;">
                        <span style="display:inline-block;width:32px;height:32px;background:#D4AF37;color:#0A0A0A;font-weight:900;font-size:18px;line-height:32px;border-radius:50%;">2</span>
                        <div style="color:#D4AF37;font-size:13px;font-weight:700;margin-top:6px;">Confirmed</div>
                      </td>
                      <td style="width:25%;text-align:center;">
                        <span style="display:inline-block;width:32px;height:32px;background:#16a34a;color:#fff;font-weight:900;font-size:18px;line-height:32px;border-radius:50%;border:2px solid #D4AF37;">3</span>
                        <div style="color:#16a34a;font-size:13px;font-weight:700;margin-top:6px;">Shipped</div>
                      </td>
                      <td style="width:25%;text-align:center;">
                        <span style="display:inline-block;width:32px;height:32px;background:#181818;color:#fff;font-weight:900;font-size:18px;line-height:32px;border-radius:50%;border:2px solid #333;">4</span>
                        <div style="color:#fff;font-size:13px;font-weight:700;margin-top:6px;">Delivered</div>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Item Recap -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#181818;border-radius:10px;">
              <tr style="color:#D4AF37;font-size:15px;font-weight:700;">
                <td style="padding:12px 0;width:80px;">Item</td>
                <td style="padding:12px 0;">Name/Size</td>
                <td style="padding:12px 0;">Qty</td>
                <td style="padding:12px 0;text-align:right;">Subtotal</td>
              </tr>
              {{itemsList}}
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
