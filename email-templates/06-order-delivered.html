<!--
Order Delivered Email (The Feedback Stage) - Boutique Luxe
Strictly <table> only, 600px max, Deep Black & Gold, fully responsive, all features as per prompt
-->
<table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="margin:0;padding:0;width:100%;background:#0A0A0A;font-family:'Playfair Display',serif,Georgia,'Times New Roman',Times,sans-serif;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#0A0A0A;border-radius:16px;overflow:hidden;">
        <!-- Header -->
        <tr>
          <td style="padding:32px 32px 0 32px;background:#0A0A0A;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="left" style="vertical-align:middle;">
                  <img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/luxe-logo-gold.png" alt="Boutique Luxe" style="height:48px;display:block;"/>
                </td>
                <td align="right" style="vertical-align:middle;">
                  <div style="color:#D4AF37;font-size:13px;font-weight:600;letter-spacing:0.5px;">Order ID</div>
                  <div style="color:#fff;font-size:16px;font-weight:700;">#{{orderId}}</div>
                  <div style="color:#bbb;font-size:13px;">{{orderDate}}</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Delivered & Celebrating -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <div style="background:#181818;border-radius:10px;padding:18px 0;text-align:center;">
              <span style="color:#D4AF37;font-size:22px;font-weight:900;letter-spacing:1px;">Delivered & Celebrating!</span>
            </div>
          </td>
        </tr>
        <!-- Download Tax Invoice -->
        <tr>
          <td style="padding:32px 32px 0 32px;" align="center">
            <a href="{{taxInvoiceLink}}" style="display:inline-block;padding:16px 48px;background:#D4AF37;color:#0A0A0A;font-size:18px;font-weight:800;border-radius:10px;text-decoration:none;">DOWNLOAD TAX INVOICE</a>
          </td>
        </tr>
        <!-- Rating System -->
        <tr>
          <td style="padding:32px 32px 0 32px;" align="center">
            <table cellpadding="0" cellspacing="0" style="margin:0 auto;">
              <tr>
                <td>
                  <a href="{{rateOrderLink}}?stars=1"><img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/star-gold.png" alt="1 Star" style="height:32px;"/></a>
                </td>
                <td>
                  <a href="{{rateOrderLink}}?stars=2"><img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/star-gold.png" alt="2 Stars" style="height:32px;"/></a>
                </td>
                <td>
                  <a href="{{rateOrderLink}}?stars=3"><img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/star-gold.png" alt="3 Stars" style="height:32px;"/></a>
                </td>
                <td>
                  <a href="{{rateOrderLink}}?stars=4"><img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/star-gold.png" alt="4 Stars" style="height:32px;"/></a>
                </td>
                <td>
                  <a href="{{rateOrderLink}}?stars=5"><img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/star-gold.png" alt="5 Stars" style="height:32px;"/></a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Referral Offer -->
        <tr>
          <td style="padding:32px 32px 0 32px;" align="center">
            <div style="color:#fff;font-size:16px;font-weight:500;background:#181818;border-radius:8px;padding:18px 24px;">Refer a friend and get <span style="color:#D4AF37;font-weight:700;">10% off</span> on your next luxe purchase.</div>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="padding:32px 32px 32px 32px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="left" style="color:#bbb;font-size:14px;">
                  Boutique Luxe, 123 Luxury Lane, Mumbai, India<br/>
                  support@eshopperr.me | +91 8447859784
                </td>
                <td align="right">
                  <a href="https://instagram.com/eshopperluxe" style="display:inline-block;"><img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/insta-gold.png" alt="Instagram" style="height:28px;vertical-align:middle;"/></a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
