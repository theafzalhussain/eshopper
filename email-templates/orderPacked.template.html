<!-- Order Packed Email Template for Boutique Luxe -->
<html>
  <body style="background:#0A0A0A; color:#D4AF37; margin:0; padding:0;">
    <table align="center" width="600" cellpadding="0" cellspacing="0" style="margin:auto; max-width:600px; background:#0A0A0A; color:#D4AF37; font-family:'Segoe UI', Arial, sans-serif;">
      <tr>
        <td style="text-align:center; padding:24px 0; font-size:22px; font-weight:bold;">Wrapped with Care</td>
      </tr>
      <tr>
        <td style="text-align:center; padding:8px 0;">Your order has been sanitized and packed in our signature eco-friendly luxe box.</td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0;">
          <img src="{{qualityCheckedIconUrl}}" alt="Quality Checked" style="height:40px;" />
        </td>
      </tr>
      <tr>
        <td style="text-align:center; padding:8px 0;">Order ID: <b>{{orderId}}</b> | Items: <b>{{itemCount}}</b></td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0; color:#fff;">You will receive a tracking link as soon as it leaves our warehouse.</td>
      </tr>
    </table>
  </body>
</html>
