<!--
Out for Delivery Email (Real-time Alert) - Boutique Luxe
Strictly <table> only, 600px max, Deep Black & Gold, fully responsive, all features as per prompt
-->
<table width="100%" bgcolor="#0A0A0A" cellpadding="0" cellspacing="0" style="margin:0;padding:0;width:100%;background:#0A0A0A;font-family:'Playfair Display',serif,Georgia,'Times New Roman',Times,sans-serif;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#0A0A0A;border-radius:16px;overflow:hidden;">
        <!-- Header -->
        <tr>
          <td style="padding:32px 32px 0 32px;background:#0A0A0A;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="left" style="vertical-align:middle;">
                  <img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/luxe-logo-gold.png" alt="Boutique Luxe" style="height:48px;display:block;"/>
                </td>
                <td align="right" style="vertical-align:middle;">
                  <div style="color:#D4AF37;font-size:13px;font-weight:600;letter-spacing:0.5px;">Order ID</div>
                  <div style="color:#fff;font-size:16px;font-weight:700;">#{{orderId}}</div>
                  <div style="color:#bbb;font-size:13px;">{{orderDate}}</div>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Arriving Today -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <div style="background:#181818;border-radius:10px;padding:18px 0;text-align:center;">
              <span style="color:#D4AF37;font-size:22px;font-weight:900;letter-spacing:1px;">It’s Arriving Today!</span>
            </div>
          </td>
        </tr>
        <!-- Safety First -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <div style="color:#fff;font-size:16px;font-weight:500;background:#181818;border-radius:8px;padding:18px 24px;">Please share the OTP only when you receive the package.</div>
          </td>
        </tr>
        <!-- Support Buttons -->
        <tr>
          <td style="padding:32px 32px 0 32px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center">
                  <a href="{{deliveryPartnerContact}}" style="display:inline-block;padding:12px 32px;background:#D4AF37;color:#0A0A0A;font-size:16px;font-weight:700;border-radius:8px;text-decoration:none;margin-right:8px;">Contact Delivery Partner</a>
                  <a href="https://wa.me/918447859784?text=Change%20Delivery%20Address%20or%20Time%20for%20Order%20{{orderId}}" style="display:inline-block;padding:12px 32px;background:#181818;color:#D4AF37;font-size:16px;font-weight:700;border-radius:8px;text-decoration:none;margin-left:8px;">Change Delivery Address/Time</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Map Graphic -->
        <tr>
          <td style="padding:32px 32px 0 32px;" align="center">
            <img src="https://res.cloudinary.com/dluxehub/image/upload/v1700000000/map-placeholder-gold.png" alt="Tracking Map" style="height:80px;border-radius:8px;"/>
          </td>
        </tr>
        <!-- Trust -->
        <tr>
          <td style="padding:32px 32px 32px 32px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center">
                  <span style="color:#D4AF37;font-size:15px;font-weight:700;">100% Authentic & Insured Delivery</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
