<!-- Out for Delivery Email Template for Boutique Luxe -->
<html>
  <body style="background:#0A0A0A; color:#D4AF37; margin:0; padding:0;">
    <table align="center" width="600" cellpadding="0" cellspacing="0" style="margin:auto; max-width:600px; background:#0A0A0A; color:#D4AF37; font-family:'Segoe UI', Arial, sans-serif;">
      <tr>
        <td style="text-align:center; padding:24px 0; font-size:22px; font-weight:bold;">It’s Arriving Today!</td>
      </tr>
      <tr>
        <td style="text-align:center; padding:8px 0;">Please share the OTP only when you receive the package.</td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0;">
          <a href="{{contactPartnerUrl}}" style="background:#D4AF37; color:#0A0A0A; padding:10px 24px; border-radius:24px; text-decoration:none; font-weight:bold;">Contact Delivery Partner</a>
          <br/><a href="{{whatsappUrl}}" style="color:#D4AF37;">Change Delivery Address/Time</a>
        </td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0;">
          <img src="{{mapGraphicUrl}}" alt="Tracking Map" style="height:80px; border-radius:8px;" />
        </td>
      </tr>
      <tr>
        <td style="text-align:center; padding:8px 0; color:#fff;">100% Authentic & Insured Delivery</td>
      </tr>
    </table>
  </body>
</html>
