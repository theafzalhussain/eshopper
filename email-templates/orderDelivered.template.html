<!-- Order Delivered Email Template for Boutique Luxe -->
<html>
  <body style="background:#0A0A0A; color:#D4AF37; margin:0; padding:0;">
    <table align="center" width="600" cellpadding="0" cellspacing="0" style="margin:auto; max-width:600px; background:#0A0A0A; color:#D4AF37; font-family:'Segoe UI', Arial, sans-serif;">
      <tr>
        <td style="text-align:center; padding:24px 0; font-size:22px; font-weight:bold;">Delivered & Celebrating!</td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0;">
          <a href="{{invoiceUrl}}" style="background:#D4AF37; color:#0A0A0A; padding:12px 32px; border-radius:24px; text-decoration:none; font-weight:bold;">DOWNLOAD TAX INVOICE</a>
        </td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0;">
          <div>
            {{#each stars}}
            <a href="{{rateOrderUrl}}" style="text-decoration:none;">
              <img src="{{starIconUrl}}" alt="Star" style="height:24px;" />
            </a>
            {{/each}}
          </div>
        </td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0; color:#fff;">
          Refer a friend and get 10% off on your next luxe purchase.
        </td>
      </tr>
      <tr>
        <td style="text-align:center; padding:16px 0; color:#fff;">
          <div>{{fullAddress}}</div>
          <div>{{contactInfo}}</div>
          <div>
            <a href="{{instagramUrl}}" style="color:#D4AF37;"><img src="{{instagramIconUrl}}" alt="Instagram" style="height:20px; vertical-align:middle;" /></a>
            <a href="{{facebookUrl}}" style="color:#D4AF37;"><img src="{{facebookIconUrl}}" alt="Facebook" style="height:20px; vertical-align:middle;" /></a>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
